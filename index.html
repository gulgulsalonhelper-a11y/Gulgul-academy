<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>GULGUL ACADEMY</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<style>
:root{
  --bg:#E7E4DD; --paper:#FFFFFF; --ink:#211E1C; --muted:#7C746B;
  --line:#DCD7CE; --line2:#ECE8E1; --vermilion:#C5402E; --vermilion-d:#A8331F; --ok:#2E7D5B; --hold:#C8862E;
}
*{box-sizing:border-box;}
html,body{margin:0; padding:0;}
.root{
  min-height:100vh; background:var(--bg); color:var(--ink);
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.topbar{
  position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between;
  padding:13px 16px; background:rgba(231,228,221,.93); backdrop-filter:saturate(1.1) blur(8px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex; align-items:baseline; gap:7px;}
.brand-mark{font-weight:800; letter-spacing:.13em; font-size:17px;}
.brand-sub{font-size:9.5px; letter-spacing:.3em; color:var(--muted); font-weight:700;}
.roleswitch{display:flex; gap:4px; background:var(--line2); padding:3px; border-radius:11px; border:1px solid var(--line);}
.role-btn{display:flex; align-items:center; gap:5px; border:none; background:transparent; padding:7px 10px;
  border-radius:8px; font-size:12px; font-weight:700; color:var(--muted); cursor:pointer; font-family:inherit; transition:all .15s;}
.role-btn.on{background:var(--paper); color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.08);}
.deptbar{display:flex; align-items:center; gap:8px; max-width:540px; margin:0 auto; padding:12px 16px 0;}
.deptbar-label{font-size:11px; font-weight:800; color:var(--muted); letter-spacing:.08em;}
.dept-chip{background:var(--paper); border:1.5px solid var(--line); border-radius:20px; padding:6px 15px;
  font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; font-family:inherit; transition:all .15s;}
.dept-chip.on{background:var(--ink); border-color:var(--ink); color:#fff;}
.connbadge{margin-left:auto; font-size:10.5px; font-weight:700; padding:5px 10px; border-radius:20px; white-space:nowrap;}
.connbadge.online{background:rgba(46,125,91,.14); color:var(--ok);}
.connbadge.loading{background:var(--line2); color:var(--muted);}
.connbadge.demo{background:rgba(200,134,46,.14); color:var(--hold);}
.fbtn.reload{margin-left:auto; padding:8px 12px; display:inline-flex; align-items:center;}
.stage{max-width:540px; margin:0 auto; padding:14px 16px 64px;}
.col{display:flex; flex-direction:column; gap:14px;}
.card{background:var(--paper); border:1px solid var(--line); border-radius:16px;}
.pad{padding:18px;}
.h2{font-size:18px; font-weight:800; margin:14px 0 2px;}
.h3{font-size:14px; font-weight:800; margin:0 0 12px;}
.muted{color:var(--muted);} .sm{font-size:12.5px; margin:2px 0 0;}
.whoami{display:flex; align-items:center; gap:10px; padding:2px 4px;}
.whoami-label{font-size:11px; font-weight:800; color:var(--muted); letter-spacing:.08em;}
.whoami-select{font-family:inherit; font-size:15px; font-weight:800; color:var(--ink); border:none;
  background:transparent; border-bottom:2px solid var(--ink); padding:2px; cursor:pointer;}
.whoami-hint{font-size:11px; color:var(--muted); margin-left:auto;}
.flash{display:flex; align-items:center; gap:7px; background:var(--ok); color:#fff; padding:11px 14px;
  border-radius:12px; font-size:13.5px; font-weight:700; animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0; transform:translateY(-6px);}to{opacity:1; transform:none;}}
.stepline{display:flex; align-items:center; gap:6px; margin-bottom:4px;}
.step{display:flex; align-items:center; gap:6px; opacity:.4;}
.step.done{opacity:1;}
.step-dot{width:22px; height:22px; border-radius:50%; background:var(--line2); color:var(--muted);
  display:grid; place-items:center; font-size:12px; font-weight:800;}
.step.done .step-dot{background:var(--ink); color:#fff;}
.step.now .step-dot{background:var(--vermilion); color:#fff;}
.step-label{font-size:12px; font-weight:700;}
.step-bar{flex:1; height:2px; background:var(--line); border-radius:2px;}
.step-bar.done{background:var(--ink);}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px;}
.pick{display:flex; flex-direction:column; gap:3px; align-items:flex-start; background:var(--paper);
  border:1.5px solid var(--line); border-radius:13px; padding:16px; cursor:pointer; font-family:inherit; transition:all .15s;}
.pick:hover{border-color:var(--ink); transform:translateY(-1px);}
.pick-big{font-size:19px; font-weight:800;}
.pick-sub{font-size:11.5px; color:var(--muted);}
.back{display:inline-flex; align-items:center; gap:3px; background:none; border:none; color:var(--muted);
  font-size:12.5px; font-weight:700; cursor:pointer; padding:0; font-family:inherit; margin-bottom:2px;}
.list{display:flex; flex-direction:column; gap:8px; margin-top:14px;}
.row{display:flex; align-items:center; justify-content:space-between; gap:10px; background:var(--paper);
  border:1.5px solid var(--line); border-radius:12px; padding:14px 15px; cursor:pointer; font-family:inherit;
  transition:all .15s; text-align:left;}
.row:hover{border-color:var(--ink);}
.row-name{font-size:14.5px; font-weight:700;}
.row-goal{display:flex; align-items:center; gap:4px; font-size:11.5px; color:var(--muted); white-space:nowrap;}
.dropzone{width:100%; display:flex; flex-direction:column; align-items:center; gap:7px; background:var(--line2);
  border:2px dashed var(--line); border-radius:14px; padding:34px 16px; margin-top:16px; cursor:pointer;
  color:var(--ink); font-family:inherit; transition:all .15s;}
.dropzone:hover{border-color:var(--vermilion); color:var(--vermilion);}
.dz-main{font-size:15px; font-weight:800;} .dz-sub{font-size:12px; color:var(--muted);}
.preview{position:relative; margin-top:16px; border-radius:13px; overflow:hidden; border:1px solid var(--line);}
.preview img{width:100%; display:block; max-height:340px; object-fit:cover; cursor:zoom-in;}
.preview-x{position:absolute; top:9px; right:9px; width:30px; height:30px; border-radius:50%;
  background:rgba(0,0,0,.6); color:#fff; border:none; cursor:pointer; display:grid; place-items:center;}
.submit{width:100%; display:flex; align-items:center; justify-content:center; gap:7px; margin-top:16px;
  background:var(--ink); color:#fff; border:none; border-radius:12px; padding:15px; font-size:15px;
  font-weight:800; cursor:pointer; font-family:inherit; transition:all .15s;}
.submit:hover:not(:disabled){background:#000;}
.submit:disabled{opacity:.32; cursor:not-allowed;}
.mine-list{display:flex; flex-direction:column;}
.mine-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:11px 0; border-bottom:1px solid var(--line2);}
.mine-row:last-child{border-bottom:none;}
.mine-text{display:flex; align-items:center; gap:9px; min-width:0; flex-wrap:wrap;}
.mine-item{font-size:14px; font-weight:600;}
.tag{font-size:10.5px; font-weight:800; color:var(--vermilion); border:1px solid var(--vermilion); border-radius:6px; padding:2px 6px; white-space:nowrap;}
.pill{display:inline-flex; align-items:center; gap:4px; font-size:11.5px; font-weight:800; padding:4px 9px; border-radius:20px; white-space:nowrap;}
.pill-ok{background:rgba(46,125,91,.12); color:var(--ok);}
.pill-hold{background:rgba(200,134,46,.14); color:var(--hold);}
.pill-wait{background:var(--line2); color:var(--muted);}
.mine-note{font-size:11.5px; color:var(--hold);}
.summary{display:flex; background:var(--ink); color:#fff; border-radius:16px; overflow:hidden;}
.sumcell{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:16px 8px;}
.sumnum{font-size:32px; font-weight:800; line-height:1; font-variant-numeric:tabular-nums;}
.num-hold{color:#E2A94E;}
.num-ok{color:#7FC4A3;}
.sumlbl{font-size:11px; color:#bcb6ad; margin-top:6px; letter-spacing:.05em; font-weight:700;}
.sumdiv{width:1px; background:rgba(255,255,255,.16);}
.filter{display:flex; gap:7px;}
.fbtn{background:var(--paper); border:1.5px solid var(--line); border-radius:20px; padding:8px 16px;
  font-size:13px; font-weight:700; cursor:pointer; color:var(--muted); font-family:inherit;}
.fbtn.on{background:var(--ink); border-color:var(--ink); color:#fff;}
.empty{display:flex; flex-direction:column; align-items:center; gap:8px; color:var(--muted); text-align:center;}
.empty p{margin:0; font-size:13.5px;}
.mgr-grid{display:flex; flex-direction:column; gap:13px;}
.subcard{background:var(--paper); border:1px solid var(--line); border-radius:16px; overflow:hidden;}
.subphoto{position:relative; display:block; width:100%; padding:0; border:none; background:var(--line2);
  aspect-ratio:16/10; overflow:hidden; cursor:zoom-in; font-family:inherit;}
.subphoto img{width:100%; height:100%; object-fit:cover;}
.zoomhint{position:absolute; left:9px; bottom:9px; display:flex; align-items:center; gap:4px;
  background:rgba(0,0,0,.55); color:#fff; font-size:11px; font-weight:700; padding:4px 8px; border-radius:20px;}
.ph{width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;}
.ph-lines{display:flex; flex-direction:column; gap:7px; width:60%;}
.ph-lines span{height:6px; background:var(--line); border-radius:3px;}
.ph-lines span:nth-child(2){width:80%;} .ph-lines span:nth-child(4){width:70%;} .ph-lines span:nth-child(5){width:50%;}
.ph-cap{font-size:11px; color:var(--muted); font-weight:700;}
.stamp{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-12deg); width:88px; height:88px;
  border:4px solid var(--vermilion); border-radius:50%; color:var(--vermilion); display:grid; place-items:center;
  font-weight:900; font-size:24px; line-height:1.05; letter-spacing:.04em;
  box-shadow:0 0 0 2px rgba(197,64,46,.18) inset; opacity:.92; animation:stampIn .35s cubic-bezier(.2,1.3,.5,1);}
@keyframes stampIn{0%{opacity:0; transform:translate(-50%,-50%) rotate(-12deg) scale(2.4);}60%{opacity:.95;}100%{opacity:.92; transform:translate(-50%,-50%) rotate(-12deg) scale(1);}}
.subbody{padding:14px 15px 15px;}
.subhead{display:flex; align-items:baseline; justify-content:space-between; gap:8px;}
.subwho{font-size:16px; font-weight:800;}
.subat{font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums;}
.submeta{display:flex; align-items:center; gap:8px; margin:8px 0 13px;}
.subitem{font-size:14px; font-weight:600;}
.approve{width:100%; display:flex; align-items:center; justify-content:center; gap:7px; background:var(--vermilion);
  color:#fff; border:none; border-radius:11px; padding:13px; font-size:15px; font-weight:800; cursor:pointer;
  font-family:inherit; transition:all .15s;}
.approve:hover{background:var(--vermilion-d);}
.btnrow{display:flex; gap:8px;}
.btnrow .approve{flex:1;}
.holdbtn{background:var(--paper); border:1.5px solid var(--hold); color:var(--hold); border-radius:11px;
  padding:13px 18px; font-size:14px; font-weight:800; cursor:pointer; font-family:inherit; transition:all .15s; white-space:nowrap;}
.holdbtn:hover{background:rgba(200,134,46,.08);}
.holdbox{display:flex; flex-direction:column; gap:9px;}
.holdinput{width:100%; border:1.5px solid var(--line); border-radius:11px; padding:11px; font-size:13.5px;
  font-family:inherit; color:var(--ink); resize:none; background:var(--line2);}
.holdinput:focus{outline:none; border-color:var(--hold); background:var(--paper);}
.holdconfirm{flex:1; background:var(--hold); color:#fff; border:none; border-radius:11px; padding:12px;
  font-size:14.5px; font-weight:800; cursor:pointer; font-family:inherit;}
.holdcancel{background:none; border:none; color:var(--muted); font-size:13px; font-weight:700; cursor:pointer;
  font-family:inherit; padding:0 14px;}
.holdnote{margin:0 0 12px; font-size:13px; color:var(--hold); background:rgba(200,134,46,.1);
  border-radius:9px; padding:9px 11px; font-weight:600;}
.stamp.hold{border-color:var(--hold); color:var(--hold); box-shadow:0 0 0 2px rgba(200,134,46,.18) inset;}
.subcard.isheld{border-color:rgba(200,134,46,.5);}
.undo{display:inline-flex; align-items:center; gap:5px; background:none; border:none; color:var(--muted);
  font-size:12.5px; font-weight:700; cursor:pointer; font-family:inherit; padding:4px 0;}
.lb{position:fixed; inset:0; z-index:50; background:rgba(20,18,16,.92); display:flex; flex-direction:column; animation:fade .2s ease;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.lb-bar{display:flex; align-items:center; justify-content:flex-end; gap:8px; padding:14px 16px;}
.lb-btn{width:42px; height:42px; border-radius:50%; border:none; background:rgba(255,255,255,.12); color:#fff;
  display:grid; place-items:center; cursor:pointer;}
.lb-btn:hover{background:rgba(255,255,255,.22);}
.lb-close{background:rgba(255,255,255,.2);}
.lb-scale{color:#fff; font-size:13px; font-weight:700; min-width:48px; text-align:center; font-variant-numeric:tabular-nums;}
.lb-body{flex:1; overflow:auto; display:flex; align-items:center; justify-content:center; padding:0 12px 28px;}
.lb-body img{max-width:100%; max-height:100%; border-radius:8px; transition:transform .15s; transform-origin:center;}
.lb-ph{color:#cfc8bf; font-size:14px; text-align:center; padding:40px; border:2px dashed rgba(255,255,255,.2); border-radius:14px;}
button:focus-visible{outline:2px solid var(--vermilion); outline-offset:2px;}
@media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important;}}
@media (max-width:380px){.grid2{grid-template-columns:1fr;}}

/* 複数枚サムネ（提出側） */
.thumbwrap{margin-top:16px;}
.thumbgrid{display:flex; flex-wrap:wrap; gap:9px;}
.thumb{position:relative; width:84px; height:84px; border-radius:11px; overflow:hidden; border:1px solid var(--line);}
.thumb img{width:100%; height:100%; object-fit:cover; cursor:zoom-in;}
.thumb-x{position:absolute; top:4px; right:4px; width:22px; height:22px; border-radius:50%; background:rgba(0,0,0,.6); color:#fff; border:none; display:grid; place-items:center; cursor:pointer;}
.thumb-add{width:84px; height:84px; border-radius:11px; border:2px dashed var(--line); background:var(--line2); color:var(--muted); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit;}
.thumb-add:hover{border-color:var(--vermilion); color:var(--vermilion);}

/* グループ表示（管理側） */
.strip{display:flex; gap:0; overflow-x:auto; background:var(--line2); -webkit-overflow-scrolling:touch;}
.stripthumb{position:relative; flex:0 0 auto; width:46%; max-width:230px; aspect-ratio:16/10; border:none; padding:0; background:var(--line2); border-right:2px solid var(--paper); cursor:zoom-in;}
.stripthumb img{width:100%; height:100%; object-fit:cover;}
.dot{position:absolute; top:7px; right:7px; width:20px; height:20px; border-radius:50%; display:grid; place-items:center;}
.dot-ok{background:var(--ok); color:#fff;}
.dot-hold{background:var(--hold);}
.cnt{font-size:12px; color:var(--muted); font-weight:700;}
.countline{margin:0 0 12px; font-size:12px; color:var(--muted); font-weight:700;}
.ph.ph-sm{gap:6px;}
.ph.ph-sm .ph-lines{width:55%; gap:5px;}
.ph.ph-sm .ph-lines span{height:5px;}


.mine-right{display:flex; align-items:center; gap:8px;}
.trash{width:30px; height:30px; border-radius:8px; border:1px solid var(--line); background:var(--paper); color:var(--muted); display:grid; place-items:center; cursor:pointer;}
.trash:hover{border-color:var(--vermilion); color:var(--vermilion);}


.lb-foot{padding:14px 16px calc(18px + env(safe-area-inset-bottom)); background:rgba(20,18,16,.96); border-top:1px solid rgba(255,255,255,.12);}
.lb-foot-msg{margin:0 0 10px; color:#fff; font-size:14px; font-weight:700; text-align:center;}
.lb-foot-btns{display:flex; gap:10px; max-width:420px; margin:0 auto;}
.lb-del{flex:1; display:flex; align-items:center; justify-content:center; gap:7px; background:var(--vermilion); color:#fff; border:none; border-radius:12px; padding:14px; font-size:15px; font-weight:800; cursor:pointer; font-family:inherit;}
.lb-keep{background:rgba(255,255,255,.14); color:#fff; border:none; border-radius:12px; padding:14px 20px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;}


/* ログイン・認証画面 */
.center{text-align:center; color:var(--muted);}
.authcard{max-width:420px; margin:24px auto 0;}
.fld{display:block; margin-top:14px;}
.fld-l{display:block; font-size:12px; font-weight:800; color:var(--muted); margin-bottom:6px; letter-spacing:.04em;}
.fld-i{width:100%; border:1.5px solid var(--line); border-radius:11px; padding:13px 14px; font-size:16px; font-family:inherit; color:var(--ink); background:var(--line2);}
.fld-i:focus{outline:none; border-color:var(--ink); background:var(--paper);}
.autherr{margin:12px 0 0; font-size:13px; font-weight:700; color:var(--vermilion);}
.authcard .submit{margin-top:18px;}
/* ユーザー表示・ログアウト */
.userbox{display:flex; align-items:center; gap:10px;}
.username{font-size:13px; font-weight:800;}
.logout{background:var(--line2); border:1px solid var(--line); border-radius:9px; padding:7px 12px; font-size:12px; font-weight:700; color:var(--muted); cursor:pointer; font-family:inherit;}
.logout:hover{color:var(--ink); border-color:var(--ink);}
.dept-fixed{font-size:15px; font-weight:800;}
.whoami-fixed{font-size:15px; font-weight:800; color:var(--ink); border-bottom:2px solid var(--ink); padding:2px 2px;}


/* 設定ボタン・シートパネル */
.gearbtn{width:36px; height:36px; border-radius:9px; background:var(--line2); border:1px solid var(--line); color:var(--muted); display:grid; place-items:center; cursor:pointer;}
.gearbtn:hover{color:var(--ink); border-color:var(--ink);}
.sheet{position:fixed; inset:0; z-index:60; background:rgba(20,18,16,.5); display:flex; align-items:flex-end; justify-content:center; animation:fade .2s ease;}
@media (min-width:560px){ .sheet{align-items:center;} }
.sheet-box{width:100%; max-width:520px; background:var(--paper); border-radius:20px 20px 0 0; max-height:88vh; overflow:auto; padding-bottom:calc(12px + env(safe-area-inset-bottom));}
@media (min-width:560px){ .sheet-box{border-radius:18px;} }
.sheet-head{position:sticky; top:0; background:var(--paper); display:flex; align-items:center; justify-content:space-between; padding:16px 18px 12px; border-bottom:1px solid var(--line2);}
.sheet-title{font-size:16px; font-weight:800;}
.sheet-x{width:32px; height:32px; border-radius:50%; border:none; background:var(--line2); color:var(--ink); display:grid; place-items:center; cursor:pointer;}
.sheet-body{padding:16px 18px;}
.menu-item{width:100%; display:flex; align-items:center; gap:10px; background:var(--paper); border:1.5px solid var(--line); border-radius:12px; padding:15px; font-size:15px; font-weight:700; color:var(--ink); cursor:pointer; font-family:inherit; margin-bottom:10px;}
.menu-item:hover{border-color:var(--ink);}
.menu-item.danger{color:var(--vermilion); border-color:rgba(197,64,46,.4);}
/* アカウント管理 */
.acc-sec{font-size:12px; font-weight:800; color:var(--muted); margin:18px 0 8px; letter-spacing:.06em;}
.acc-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:11px 0; border-bottom:1px solid var(--line2);}
.acc-row.off{opacity:.5;}
.acc-info{display:flex; flex-direction:column; gap:2px; min-width:0;}
.acc-name{font-size:14.5px; font-weight:700; display:flex; align-items:center; gap:7px;}
.acc-badge{font-size:10px; font-weight:800; color:var(--vermilion); border:1px solid var(--vermilion); border-radius:5px; padding:1px 5px;}
.acc-sub{font-size:11.5px; color:var(--muted);}
.acc-actions{display:flex; gap:6px; flex:0 0 auto;}
.acc-btn{background:var(--paper); border:1.5px solid var(--line); border-radius:9px; padding:7px 11px; font-size:12px; font-weight:700; color:var(--muted); cursor:pointer; font-family:inherit; white-space:nowrap;}
.acc-btn:hover{border-color:var(--ink); color:var(--ink);}
.acc-off{border-color:rgba(197,64,46,.4); color:var(--vermilion);}
.acc-on{border-color:rgba(46,125,91,.5); color:var(--ok);}
.acc-msg{background:var(--ink); color:#fff; border-radius:10px; padding:10px 13px; font-size:13px; font-weight:700; margin:0 0 12px;}


.practicebar{display:flex; align-items:center; justify-content:space-between; gap:10px; background:var(--hold); color:#fff; padding:9px 16px; font-size:12.5px; font-weight:800;}
.practice-exit{background:rgba(255,255,255,.22); color:#fff; border:none; border-radius:8px; padding:6px 12px; font-size:12px; font-weight:800; cursor:pointer; font-family:inherit;}


.practicebar{flex-wrap:wrap;}
